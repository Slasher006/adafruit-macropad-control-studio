name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[test,docs]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q desktop device tools

      - name: Regenerate tutorial PDF
        run: python tools/generate_configurator_tutorial.py

      - name: Check generated tutorial
        run: test -s output/pdf/adafruit-macropad-configurator-tutorial.pdf
